# ════════════════════════════════════════════
# netlify.toml — Configuración de despliegue
# ════════════════════════════════════════════

[build]
  # Comando para generar el build de producción con Vite
  command = "npm run build"

  # Carpeta que Vite genera al hacer build
  publish = "dist"

# ─── Headers de seguridad ───
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    # Permite acceso a cámara desde HTTPS (Netlify sirve HTTPS por defecto)
    Permissions-Policy     = "camera=(self)"

# ─── Redireccionamiento SPA (por si añades rutas) ───
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ─── Cache de assets estáticos ───
[[headers]]
  for = "/styles/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/scripts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
